<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Improved Design</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(to right, #6a11cb, #2575fc);
            color: #333;
            margin: 0;
            padding: 20px;
            transition: background 0.3s;
        }
        h1 {
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
            margin: 20px;
            padding: 20px;
            transition: transform 0.3s;
        }
        .card:hover {
            transform: scale(1.05);
        }
        button {
            background-color: #6200ea;
            border: none;
            color: white;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        button:hover {
            background-color: #3700b3;
        }
        @media (max-width: 600px) {
            body {
                padding: 10px;
            }
            .card {
                margin: 10px;
            }
        }
    </style>
</head>
<body>
    <h1>Welcome to the Improved Design</h1>
    <div class="card">
        <h2>Card Title</h2>
        <p>This is a card with an improved design.</p>
        <button>Click Me!</button>
    </div>
</body>
</html>
