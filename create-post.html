<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Create Post - Zipu</title>
  
  <style>
    :root {
      --bg: #0b0c10;
      --card: #111318;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --border: #1f2430;
      --primary: #4f8cff;
      --danger: #ff4d4d;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
    }
    
    .title {
      font-weight: 700;
    }
    
    /* CONTAINER */
    .container {
      padding: 14px;
      max-width: 600px;
      margin: auto;
    }
    
    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }
    
    /* TEXTAREA */
    textarea {
      width: 100%;
      min-height: 140px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 12px;
      color: var(--text);
      outline: none;
      resize: none;
      font-size: 15px;
    }
    
    textarea:focus {
      border-color: var(--primary);
    }
    
    /* FOOTER ROW */
    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 10px;
    }
    
    /* BUTTON */
    button {
      background: var(--primary);
      border: none;
      color: white;
      padding: 10px 16px;
      border-radius: 10px;
      font-weight: 600;
      cursor: pointer;
    }
    
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    
    /* COUNTER */
    .counter {
      font-size: 12px;
      color: var(--muted);
    }
    
    /* ERROR */
    .error {
      color: var(--danger);
      font-size: 13px;
      margin-top: 8px;
      display: none;
    }
  </style>
</head>

<body>
  
  <div class="header">
    <div class="title">Create Post</div>
  </div>
  
  <div class="container">
    
    <div class="card">
      
      <textarea id="content" placeholder="What's happening on Zipu?"></textarea>
      
      <div class="row">
        <div class="counter" id="counter">0 / 500</div>
        <button id="btn" onclick="post()">Publish</button>
      </div>
      
      <div class="error" id="errorBox"></div>
      
    </div>
    
  </div>
  
  <script>
    const API = "https://api.wisdomdigitaltech.com";
    
    const btn = document.getElementById("btn");
    const errorBox = document.getElementById("errorBox");
    const counter = document.getElementById("counter");
    const content = document.getElementById("content");
    
    /* AUTH CHECK */
    const user_id = localStorage.getItem("user_id");
    const token = localStorage.getItem("token");
    
    if (!user_id || !token) {
      location.href = "login.html";
    }
    
    /* CHARACTER COUNTER */
    content.addEventListener("input", () => {
      counter.textContent = `${content.value.length} / 500`;
      
      if (content.value.length > 500) {
        counter.style.color = "red";
      } else {
        counter.style.color = "#9aa0a6";
      }
    });
    
    /* SAFE POST ID (4+ digits) */
    function generatePostId() {
      return (Math.floor(1000 + Math.random() * 900000)).toString();
    }
    
    /* ERROR */
    function showError(msg) {
      errorBox.style.display = "block";
      errorBox.textContent = msg;
    }
    
    /* POST FUNCTION */
    async function post() {
      
      errorBox.style.display = "none";
      
      const text = content.value.trim();
      
      if (!text) {
        showError("Post cannot be empty");
        return;
      }
      
      if (text.length > 500) {
        showError("Post too long (max 500 characters)");
        return;
      }
      
      btn.disabled = true;
      btn.textContent = "Publishing...";
      
      try {
        
        const res = await fetch(API + "/create-post", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + token
          },
          body: JSON.stringify({
            user_id,
            post_id: generatePostId(),
            content: text
          })
        });
        
        const data = await res.json();
        
        if (data.error) {
          showError("Failed to publish post");
          btn.disabled = false;
          btn.textContent = "Publish";
          return;
        }
        
        // SUCCESS → BACK TO FEED
        location.href = "index.html";
        
      } catch (err) {
        showError("Network error. Try again.");
      }
      
      btn.disabled = false;
      btn.textContent = "Publish";
    }
  </script>
  
</body>

</html>
