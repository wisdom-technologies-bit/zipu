<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Zipu Profile</title>
  
  <style>
    :root {
      --bg: #0b0c10;
      --card: #111318;
      --text: #e6e6e6;
      --muted: #9aa0a6;
      --border: #1f2430;
      --primary: #4f8cff;
      --danger: #ff4d4d;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: system-ui, -apple-system, sans-serif;
    }
    
    body {
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }
    
    /* HEADER */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      background: var(--bg);
    }
    
    .brand {
      font-weight: 700;
      font-size: 18px;
    }
    
    .logout {
      color: var(--danger);
      font-size: 14px;
      cursor: pointer;
    }
    
    /* CONTAINER */
    .container {
      padding: 14px;
      max-width: 600px;
      margin: auto;
    }
    
    /* CARD */
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px;
      margin-top: 12px;
    }
    
    /* USER INFO */
    .name {
      font-size: 18px;
      font-weight: 600;
    }
    
    .email {
      font-size: 13px;
      color: var(--muted);
      margin-top: 4px;
    }
    
    /* BUTTONS */
    button {
      width: 100%;
      padding: 12px;
      border-radius: 10px;
      border: none;
      background: var(--primary);
      color: white;
      font-weight: 600;
      cursor: pointer;
      margin-top: 10px;
    }
    
    /* POSTS */
    .post {
      padding: 10px;
      border-bottom: 1px solid var(--border);
    }
    
    .post:last-child {
      border-bottom: none;
    }
    
    .small {
      font-size: 12px;
      color: var(--muted);
    }
  </style>
</head>

<body>
  
  <!-- HEADER -->
  <div class="header">
    <div class="brand">Zipu</div>
    <div class="logout" onclick="logout()">Logout</div>
  </div>
  
  <div class="container">
    
    <!-- USER CARD -->
    <div class="card">
      <div class="name" id="name">Loading...</div>
      <div class="email" id="email"></div>
      
      <button onclick="goPost()">Create Post</button>
    </div>
    
    <!-- POSTS -->
    <div class="card">
      <div class="name">Your Posts</div>
      <div id="posts"></div>
    </div>
    
  </div>
  
  <script>
    const API = "https://api.wisdomdigitaltech.com";
    
    /* AUTH CHECK */
    const token = localStorage.getItem("token");
    const user_id = localStorage.getItem("user_id");
    
    if (!token || !user_id) {
      location.href = "login.html";
    }
    
    /* LOAD PROFILE */
    async function loadProfile() {
      
      try {
        const res = await fetch(API + "/profile?user_id=" + user_id, {
          headers: {
            "Authorization": "Bearer " + token
          }
        });
        
        const data = await res.json();
        
        document.getElementById("name").textContent = data.name || "User";
        document.getElementById("email").textContent = data.email || "";
        
      } catch (e) {
        document.getElementById("name").textContent = "Error loading profile";
      }
    }
    
    /* LOAD POSTS */
    async function loadPosts() {
      
      const res = await fetch(API + "/posts?user_id=" + user_id);
      const data = await res.json();
      
      const container = document.getElementById("posts");
      container.innerHTML = "";
      
      data.forEach(p => {
        const div = document.createElement("div");
        div.className = "post";
        div.innerHTML = `
      <div>${p.content}</div>
      <div class="small">${p.created_at}</div>
    `;
        container.appendChild(div);
      });
    }
    
    /* CREATE POST */
    function goPost() {
      location.href = "create-post.html";
    }
    
    /* LOGOUT */
    function logout() {
      localStorage.removeItem("token");
      localStorage.removeItem("user_id");
      location.href = "login.html";
    }
    
    /* INIT */
    loadProfile();
    loadPosts();
  </script>
  
</body>

</html>
